# Publish catpath to PyPI via Trusted Publishing (OIDC) — no API token needed.
#
# This file's NAME (workflow.yml), the repo (retospect/catpath) and the
# environment (pypi) must match the PyPI trusted-publisher configuration.
# Trigger: publishing a GitHub Release.  Also runnable manually.
#
# One-time GitHub setup: create an Environment named `pypi`
# (Settings -> Environments) — it may be auto-created on first run.
name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Must match the "Environment name" set in the PyPI trusted publisher.
    environment: pypi
    permissions:
      id-token: write        # OIDC token for trusted publishing (no password/token)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
